<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Program Command</title>
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        :root {
            --f-bg: #f7f7f8;
            --f-surface: #ffffff;
            --f-surface-subtle: #f1f2f4;
            --f-surface-inset: #e7e9ed;
            --f-ink: #0d1117;
            --f-ink-inverse: #ffffff;
            --f-muted: #3f4652;
            --f-soft: #6a737d;
            --f-hairline: #c9d1d9;
            --f-rule: #111827;
            --f-blue: #0969da;
            --f-blue-text: #0550ae;
            --f-blue-wash: #ddf4ff;
            --f-red: #cf222e;
            --f-red-wash: #ffebe9;
            --f-focus: 0 0 0 3px rgba(9, 105, 218, .22);
            --f-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            --f-mono: "SFMono-Regular", "SF Mono", Consolas, "Liberation Mono", Menlo, monospace;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--f-bg);
            font-family: var(--f-sans);
            color: var(--f-ink);
            padding: 24px;
            letter-spacing: 0;
        }

        .login-shell {
            width: min(420px, 100%);
            background: var(--f-surface);
            border: 1px solid var(--f-hairline);
            border-left: 4px solid var(--f-rule);
            border-radius: 0;
            box-shadow: none;
            padding: 24px;
        }

        .login-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: max-content;
            font-family: var(--f-mono);
            font-size: 11px;
            font-weight: 850;
            letter-spacing: 0;
            text-transform: uppercase;
            color: var(--f-soft);
            margin-bottom: 8px;
        }

        .login-eyebrow::before {
            content: "";
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: var(--f-blue);
        }

        h1 {
            font-size: 28px;
            font-weight: 760;
            letter-spacing: 0;
            margin: 0 0 8px;
        }

        .login-subtitle {
            margin: 0 0 20px;
            color: var(--f-muted);
            font-size: 14px;
            line-height: 1.4;
        }

        .login-form {
            display: grid;
            gap: 14px;
        }

        .login-field {
            display: grid;
            gap: 6px;
        }

        .login-field label {
            color: var(--f-soft);
            font-family: var(--f-mono);
            font-size: 11px;
            font-weight: 850;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .login-field input {
            border: 1px solid var(--f-hairline);
            border-radius: 0;
            font-size: 14px;
            padding: 10px 12px;
        }

        .login-field input:focus {
            outline: none;
            border-color: var(--f-blue);
            box-shadow: var(--f-focus);
        }

        .login-button {
            background: var(--f-rule);
            color: var(--f-ink-inverse);
            border: 1px solid var(--f-rule);
            border-radius: 0;
            font-size: 14px;
            font-weight: 760;
            padding: 10px 14px;
            cursor: pointer;
        }

        .login-button:hover {
            background: var(--f-ink);
        }

        .oauth-divider {
            margin: 4px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--f-soft);
            font-family: var(--f-mono);
            font-size: 11px;
            font-weight: 850;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .oauth-divider::before,
        .oauth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--f-hairline);
        }

        .oauth-buttons {
            display: grid;
            gap: 8px;
        }

        .oauth-button {
            border: 1px solid var(--f-hairline);
            background: var(--f-surface);
            color: var(--f-ink);
            border-radius: 0;
            padding: 10px 12px;
            font-size: 14px;
            font-weight: 650;
            text-align: center;
            cursor: pointer;
        }

        .oauth-button:hover {
            background: var(--f-surface-subtle);
            border-color: var(--f-rule);
        }

        .linking-panel {
            margin-top: 14px;
            border: 1px solid var(--f-hairline);
            border-left: 4px solid var(--f-blue);
            border-radius: 0;
            background: var(--f-surface-subtle);
            padding: 12px;
            display: none;
        }

        .linking-panel.visible {
            display: block;
        }

        .linking-title {
            margin: 0 0 6px;
            font-size: 13px;
            font-weight: 760;
            color: var(--f-ink);
        }

        .linking-copy {
            margin: 0 0 8px;
            font-size: 12px;
            color: var(--f-muted);
            line-height: 1.4;
        }

        .linked-providers {
            margin: 8px 0 0;
            padding: 0;
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .linked-providers li {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--f-hairline);
            background: var(--f-blue-wash);
            color: var(--f-blue-text);
            border-radius: 0;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .linked-providers li::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: currentColor;
        }

        .login-error {
            display: none;
            margin-top: 12px;
            border: 1px solid var(--f-red);
            border-left: 4px solid var(--f-red);
            border-radius: 0;
            background: var(--f-red-wash);
            color: var(--f-red);
            font-size: 13px;
            padding: 10px 12px;
        }

        .login-help {
            margin-top: 14px;
            color: var(--f-muted);
            font-size: 13px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth-service.js"></script>
</head>
<body>
    <main class="login-shell" aria-labelledby="loginHeading">
        <div class="login-eyebrow">Program Command</div>
        <h1 id="loginHeading">Sign in</h1>
        <p class="login-subtitle">Use your invited account to access scheduler dashboards.</p>

        <form class="login-form" id="loginForm">
            <div class="login-field">
                <label for="loginEmail">Email</label>
                <input id="loginEmail" type="email" autocomplete="email" required>
            </div>

            <div class="login-field">
                <label for="loginPassword">Password</label>
                <input id="loginPassword" type="password" autocomplete="current-password" required>
            </div>

            <button type="submit" class="login-button" id="loginButton">Sign in</button>
        </form>

        <div class="oauth-divider">or continue with</div>
        <div class="oauth-buttons">
            <button type="button" class="oauth-button" id="oauthGoogleButton" data-provider="google">Continue with Google</button>
            <button type="button" class="oauth-button" id="oauthGithubButton" data-provider="github">Continue with GitHub</button>
            <button type="button" class="oauth-button" id="oauthAppleButton" data-provider="apple">Continue with Apple</button>
        </div>

        <section class="linking-panel" id="linkingPanel" aria-live="polite">
            <h2 class="linking-title">Link Additional Login Methods</h2>
            <p class="linking-copy">
                Link providers only after signing into your existing account first. Accounts are not auto-merged by email.
            </p>
            <ul class="linked-providers" id="linkedProvidersList"></ul>
        </section>

        <div class="login-error" id="loginError" role="alert"></div>
        <p class="login-help">If you need access, ask an admin for an invite.</p>
    </main>

    <script src="pages/login.js"></script>
</body>
</html>
