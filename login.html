<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Program Command</title>
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(180deg, #f6f8fa 0%, #ffffff 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: #1f2328;
            padding: 24px;
        }

        .login-shell {
            width: min(420px, 100%);
            background: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            box-shadow: 0 16px 36px rgba(31, 35, 40, 0.12);
            padding: 24px;
        }

        .login-eyebrow {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #a10022;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 28px;
            margin: 0 0 8px;
        }

        .login-subtitle {
            margin: 0 0 20px;
            color: #57606a;
            font-size: 14px;
            line-height: 1.4;
        }

        .login-form {
            display: grid;
            gap: 14px;
        }

        .login-field {
            display: grid;
            gap: 6px;
        }

        .login-field label {
            font-size: 13px;
            font-weight: 600;
        }

        .login-field input {
            border: 1px solid #d0d7de;
            border-radius: 8px;
            font-size: 14px;
            padding: 10px 12px;
        }

        .login-field input:focus {
            outline: none;
            border-color: #a10022;
            box-shadow: 0 0 0 3px rgba(161, 0, 34, 0.15);
        }

        .login-button {
            background: #a10022;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            padding: 10px 14px;
            cursor: pointer;
        }

        .login-button:hover {
            background: #8a001d;
        }

        .login-error {
            display: none;
            margin-top: 12px;
            border: 1px solid #f1b0b7;
            border-radius: 8px;
            background: #fff0f1;
            color: #cf222e;
            font-size: 13px;
            padding: 10px 12px;
        }

        .login-help {
            margin-top: 14px;
            color: #57606a;
            font-size: 13px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth-service.js"></script>
</head>
<body>
    <main class="login-shell" aria-labelledby="loginHeading">
        <div class="login-eyebrow">Program Command</div>
        <h1 id="loginHeading">Sign in</h1>
        <p class="login-subtitle">Use your invited account to access scheduler dashboards.</p>

        <form class="login-form" id="loginForm">
            <div class="login-field">
                <label for="loginEmail">Email</label>
                <input id="loginEmail" type="email" autocomplete="email" required>
            </div>

            <div class="login-field">
                <label for="loginPassword">Password</label>
                <input id="loginPassword" type="password" autocomplete="current-password" required>
            </div>

            <button type="submit" class="login-button" id="loginButton">Sign in</button>
        </form>

        <div class="login-error" id="loginError" role="alert"></div>
        <p class="login-help">If you need access, ask an admin for an invite.</p>
    </main>

    <script src="pages/login.js"></script>
</body>
</html>
